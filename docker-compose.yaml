services:

  practice-app:
    build: ../bondar-practice-app
    ports:
      - "4200:4200"

  playwright-runner:
    build: .
    depends_on:
      - practice-app
    environment:
      - BASE_URL=http://practice-app:4200

  jenkins:
    image: jenkins/jenkins:lts
    environment:
      - JAVA_OPTS=-Dhudson.model.DirectoryBrowserSupport.CSP=""