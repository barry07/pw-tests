services:
  # 1. Your Frontend/Application Service
  bondar-practice-app:
    image: bondar-practice-app-practice-app:latest # Replace with your actual image
    ports:
      - "4201:4200"
    healthcheck:
      # This checks if the web server is actually responding
      test: ["CMD", "curl", "-f", "http://localhost:4200"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # 2. Your Playwright Test Runner
  playwright-runner:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      bondar-practice-app:
        # This is the "Magic" - it won't start tests until the app is HEALTHY
        condition: service_healthy
    environment:
      # Use the service name 'bondar-practice-app' as the hostname
      - BASE_URL=http://bondar-practice-app:4200
    volumes:
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results
